name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="vissong/ianchor"
          TARBALL_URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"

          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256: ${SHA256}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/vissong/homebrew-ianchor.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/ianchor.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/ianchor.rb

          if [ -n "$(git diff --name-only Formula/ianchor.rb)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Formula/ianchor.rb
            git commit -m "chore: update formula for ${TAG}"
            git push origin main
          fi
